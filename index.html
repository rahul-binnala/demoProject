<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> </title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="../CSS/styles.css">
    </head>
    <body>
        <header class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="add-one">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-two">India</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="select-option">
                    <option>All</option>
                </select>
                <input placeholder="Search Amazon" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <div class="nav-signin border">
                <p class="text1">Hello, sign in</p>
                <p class="text2">Accounts & Lists</p>
            </div>
            <div class="nav-return">
                <p class="text1">Returns</p>
                <p class="text2">& Orders</p>
            </div>
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </header>
        
        <div class="panel-bar">
            <div class="panel border">
                <i class="fa-solid fa-bars"></i>
                All
            </div>

            <div class="panel-ops">
                <p class="border">Medical Care</p>
                <p class="border">Amazon Basics</p>
                <p class="border">Best Sellers</p>
                <p class="border">Books</p>
                <p class="border">Prime</p>
                <p class="border">Gift Cards</p>
                <p class="border">Registry</p>
                <p class="border">Groceries</p>
                <p class="border">Smart Home</p>
                <p class="border">Today's Deals</p>
                <p class="border">New Releases</p>
                <p class="border">Sell</p>
                <p class="border">Music</p>
                <p class="border">Fashion</p>
            </div>
        </div>

        <div class="hero-space">
            <div class="hero-msg">
                <p class="terms"><a>Terms apply.</a></p>
            </div>
        </div>

        <div class="shop-section">
            <div class="box1 box">box1</div>
            <div class="box2 box">box2</div>
            <div class="box3 box">box3</div>
            <div class="box4 box">box4</div>
        </div>
    </body>
</html>
